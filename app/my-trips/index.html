<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Trips - Voyago</title>
    <link rel="stylesheet" href="/app/layout.css">
    <link rel="stylesheet" href="/app/my-trips/my-trips.css">
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
    <div class="app-shell">
        <aside class="app-sidebar">
            <div class="app-brand">
                <span>Voyago</span>
                <span class="badge">User App</span>
            </div>
            <nav class="app-nav">
                <a data-app-nav href="/app/home/">🏠 Home</a>
                <a data-app-nav href="/app/explore/">🧭 Explore</a>
                <a data-app-nav href="/app/parking/">🅿️ Smart Parking</a>
                <a data-app-nav href="/app/my-trips/">🧳 My Trips</a>
                <a data-app-nav href="/app/my-parking/">🚗 My Parking</a>
                <a data-app-nav href="/app/reviews/">⭐ Reviews</a>
                <a data-app-nav href="/app/profile/">👤 Profile</a>
                <button id="appLogout">Logout</button>
            </nav>
        </aside>

        <main class="app-main">
            <header class="app-header">
                <div>
                    <h1 class="app-title">Your trips</h1>
                    <p class="app-subtitle">View your booked destinations and manage your travel plans.</p>
                </div>
            </header>

            <section class="app-section">
                <div class="section-head">
                    <h3>Active & upcoming</h3>
                    <p id="tripCount" class="app-subtitle">Loading your trips...</p>
                </div>
                <div id="tripsList" class="card-grid trips-grid"></div>
            </section>

            <section class="app-section" id="pastTripsSection" style="display: none;">
                <div class="section-head">
                    <h3>Completed trips</h3>
                    <p>Relive your favorite journeys.</p>
                </div>
                <div id="pastTripsList" class="card-grid trips-grid"></div>
            </section>
        </main>
    </div>

    <script src="/app/layout.js"></script>
    <script src="/app/my-trips/my-trips.js"></script>
</body>
</html>
