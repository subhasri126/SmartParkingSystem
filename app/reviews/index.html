<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Reviews - Voyago</title>
    <link rel="stylesheet" href="/app/layout.css">
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
</head>
<body>
    <div class="app-shell">
        <aside class="app-sidebar">
            <div class="app-brand">
                <span>Voyago</span>
                <span class="badge">User App</span>
            </div>
            <nav class="app-nav">
                <a data-app-nav href="/app/home/">🏠 Home</a>
                <a data-app-nav href="/app/explore/">🧭 Explore</a>
                <a data-app-nav href="/app/parking/">🅿️ Smart Parking</a>
                <a data-app-nav href="/app/my-trips/">🧳 My Trips</a>
                <a data-app-nav href="/app/my-parking/">🚗 My Parking</a>
                <a data-app-nav href="/app/reviews/">⭐ Reviews</a>
                <a data-app-nav href="/app/profile/">👤 Profile</a>
                <button id="appLogout">Logout</button>
            </nav>
        </aside>

        <main class="app-main">
            <header class="app-header">
                <div>
                    <h1 class="app-title">Your reviews</h1>
                    <p class="app-subtitle">Rate your destinations and share short feedback for other travelers.</p>
                </div>
            </header>

            <section class="section-row">
                <article class="app-card">
                    <h3>Submit a review</h3>
                    <form id="reviewForm" class="review-form">
                        <label for="reviewDestination">Destination</label>
                        <select id="reviewDestination" required></select>

                        <label for="reviewRating">Rating</label>
                        <select id="reviewRating" required>
                            <option value="">Select rating</option>
                            <option value="5">5 - Excellent</option>
                            <option value="4">4 - Very good</option>
                            <option value="3">3 - Good</option>
                            <option value="2">2 - Fair</option>
                            <option value="1">1 - Poor</option>
                        </select>

                        <label for="reviewText">Short review</label>
                        <textarea id="reviewText" rows="4" placeholder="Keep it short and helpful" required></textarea>

                        <button type="submit" class="review-submit">Submit review</button>
                        <p id="reviewMessage" class="app-subtitle"></p>
                    </form>
                </article>

                <article class="app-card">
                    <h3>Recent reviews</h3>
                    <ul id="reviewList" class="list-clean"></ul>
                </article>
            </section>
        </main>
    </div>

    <script src="/app/layout.js"></script>
    <script src="/app/reviews/reviews.js"></script>
</body>
</html>
